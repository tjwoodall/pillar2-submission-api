  /organisations/pillar-two/account-activity:
    get:
      operationId: retrieveAccountActivity
      tags:
      - submission
      summary: Retrieve Account Activity
      parameters:
      - in: query
        name: fromDate
        required: true
        schema:
          type: string
          format: date
        description: Start of period to retrieve activity from.
      - in: query
        name: toDate
        required: true
        schema:
          type: string
          format: date
        description: End of period to retrieve activity from.
      - in: header
        name: Authorization
        required: true
        schema:
          type: string
        description: Bearer token for authentication
      - in: header
        name: X-Pillar2-Id
        required: true
        schema:
          type: string
        description: Pillar2 ID to retrieve activity for.
      - in: header
        name: Accept
        required: false
        schema:
          type: string
          example: application/vnd.hmrc.1.0+json
        description: "Specifies the expected response format as versioned JSON from the HMRC API (v1.0). If not provided, it will default to application/vnd.hmrc.1.0+json."
      responses:
        "200":
