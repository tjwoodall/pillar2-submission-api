      description: |
        Retrieve Account Activity for a specified period. Currently the only way to distinguish between different charges and payments is via the transaction descriptions. It is essential that API consumers match against these transaction description strings exactly, as they are the primary mechanism for identifying the nature of each charge or payment on the account.

        Consumers can use these transaction descriptions in addition to the examples that have been provided to complete their implementation.

        ### Example Scenarios
        <p>This table contains a list of transaction examples that are included in the request made to this endpoint. Appeals and standovers can apply to some of the transaction description, excluding the following transactions: determinations </p>
        <table>
        <thead>
        <tr>
        <th>Transaction Description</th>
        <th>Explanation</th>
        </tr>
        </thead>
        <tbody>
        <tr>
        <td>UKTR - DTT</td>
        <td>Amount of Domestic Top-Up Tax payable as reported on the UK Pillar 2 Tax Return, applied to an account marked as domestic only.</td>
        </tr>
        <tr>
        <td>UKTR - MTT (IIR)</td>
        <td>Amount of Multinational Top-Up Tax due under the Income Inclusion Rule as reported on the UK Pillar 2 Tax Return, applied to an account marked as non-domestic.</td>
        </tr>
        <tr>
        <td>UKTR - MTT (UTPR)</td>
        <td>Amount of Multinational Top-Up Tax due under the Undertaxed Profits Rule as reported on the UK Pillar 2 Tax Return, applied to an account marked as non-domestic.</td>
        </tr>
        <tr>
        <td>Late UKTR pay int - DTT</td>
        <td>Interest charged on late payment of Domestic Top-Up Tax shown on the UK Pillar 2 Tax Return. These charges will only show after the main debit is settled. In order for interest to have accrued, a group must have cleared their debt after the due date.</td>
        </tr>
        <tr>
        <td>Late UKTR pay int - MTT(IIR)</td>
        <td>Interest charged on late payment of Multinational Top-Up Tax under the Income Inclusion Rule. This charge is applied to an account marked as non-domestic.</td>
        </tr>
        <tr>
        <td>Late UKTR pay int - MTT(UTPR)</td>
        <td>Interest charged on late payment of Multinational Top-Up Tax under the Undertaxed Profits Rule. This charge is applied to an account marked as non-domestic.</td>
        </tr>
        <tr>
        <td>Repayment interest - UKTR</td>
        <td>Interest paid by HMRC on amounts overpaid by a company under the UK Pillar 2 Tax Return. This is completed via a credit transaction.</td>
        </tr>
        <tr>
        <td>Late UKTR sub pen - DTT</td>
        <td>Penalty for late submission of the UK Pillar 2 Tax Return relating to Domestic Top-Up Tax.</td>
        </tr>
        <tr>
        <td>Late UKTR sub pen - DTT 3mnth</td>
        <td>Additional penalty where the UKTR for Domestic Top-Up Tax is more than 3 months late.</td>
        </tr>
        <tr>
        <td>Late UKTR sub pen - DTT 6mnth</td>
        <td>Additional penalty where the UKTR for Domestic Top-Up Tax is more than 6 months late.</td>
        </tr>
        <tr>
        <td>Late UKTR sub pen - DTT 12mnth</td>
        <td>Additional penalty where the UKTR for Domestic Top-Up Tax is more than 12 months late.</td>
        </tr>
        <tr>
        <td>Late UKTR sub pen - MTT</td>
        <td>Penalty for late submission of the UKTR relating to Multinational Top-Up Tax.</td>
        </tr>
        <tr>
        <td>Late UKTR sub pen - MTT 3mnth</td>
        <td>Additional penalty where the UKTR for Multinational Top-Up Tax is more than 3 months late.</td>
        </tr>
        <tr>
        <td>Late UKTR sub pen - MTT 6mnth</td>
        <td>Additional penalty where the UKTR for Multinational Top-Up Tax is more than 6 months late.</td>
        </tr>
        <tr>
        <td>Late UKTR sub pen - MTT 12mnth</td>
        <td>Additional penalty where the UKTR for Multinational Top-Up Tax is more than 12 months late.</td>
        </tr>
        <tr>
        <td>Late ORN/GIR sub pen - DTT</td>
        <td>Penalty for late submission of the Overseas Return Notification or GloBE Information Return relating to Domestic Top-Up Tax. When the group is multinational, DTT and MTT penalties will apply. When the group is domestic-only, DTT penalties will apply.</td>
        </tr>
        <tr>
        <td>Late ORN/GIR sub pen -DTT3mnth</td>
        <td>Additional penalty where the ORN/GIR for Domestic Top-Up Tax is more than 3 months late.</td>
        </tr>
        <tr>
        <td>Late ORN/GIR sub pen -DTT6mnth</td>
        <td>Additional penalty where the ORN/GIR for Domestic Top-Up Tax is more than 6 months late.</td>
        </tr>
        <tr>
        <td>Late ORN/GIR sub pen - MTT</td>
        <td>Penalty for late submission of the ORN/GIR relating to Multinational Top-Up Tax.</td>
        </tr>
        <tr>
        <td>Late ORN/GIR sub pen-MTT 3mnth</td>
        <td>Additional penalty where the ORN/GIR for Multinational Top-Up Tax is more than 3 months late.</td>
        </tr>
        <tr>
        <td>Late ORN/GIR sub pen-MTT 6mnth</td>
        <td>Additional penalty where the ORN/GIR for Multinational Top-Up Tax is more than 6 months late.</td>
        </tr>
        <tr>
        <td>Schedule 24 inaccurate return</td>
        <td>Penalty for inaccuracies in a Pillar 2 return filed by a customer, that results in lost tax revenue.</td>
        </tr>
        <tr>
        <td>Schedule 36 information notice</td>
        <td>Penalty for failure to comply with an information or document request issued under Schedule 36. This has been extended to include information notices required to establish Pillar 2 liabilities. Failure to not comply with a notice can lead to a penalty.</td>
        </tr>
        <tr>
        <td>Accurate records failure pen</td>
        <td>Penalty for failing to maintain records required to support Pillar 2 tax calculations.</td>
        </tr>
        <tr>
        <td>General Anti Abuse Rule pen</td>
        <td>Penalty for tax avoidance which falls within the General Anti Abuse Rule. When successful, 60% of the tax will be charged.</td>
        </tr>
        <tr>
        <td>Determination - DTT</td>
        <td>Tax amount determined by HMRC for Domestic Top-Up Tax where no valid return was submitted.</td>
        </tr>
        <tr>
        <td>Determination - MTT (IIR)</td>
        <td>Tax amount determined by HMRC for Multinational Top-Up Tax under the Income Inclusion Rule.</td>
        </tr>
        <tr>
        <td>Determination - MTT (UTPR)</td>
        <td>Tax amount determined by HMRC for Multinational Top-Up Tax under the Undertaxed Profits Rule.</td>
        </tr>
        <tr>
        <td>Determination interest - DTT</td>
        <td>Interest charged on a Determination for Domestic Top-Up Tax.</td>
        </tr>
        <tr>
        <td>Determination int- MTT (IIR)</td>
        <td>Interest charged on a Determination for Multinational Top-Up Tax under the Income Inclusion Rule.</td>
        </tr>
        <tr>
        <td>Determination int - MTT (UTPR)</td>
        <td>Interest charged on a Determination for Multinational Top-Up Tax under the Undertaxed Profits Rule.</td>
        </tr>
        <tr>
        <td>Discovery Assessment - DTT</td>
        <td>A discovery assessment raised by HMRC for Domestic Top-Up Tax where additional tax is found to be due.</td>
        </tr>
        <tr>
        <td>Discovery Assessment-MTT(IIR)</td>
        <td>A discovery assessment raised by HMRC for Multinational Top-Up Tax under the Income Inclusion Rule.</td>
        </tr>
        <tr>
        <td>Discovery Assessment-MTT(UTPR)</td>
        <td>A discovery assessment raised by HMRC for Multinational Top-Up Tax under the Undertaxed Profits Rule.</td>
        </tr>
        <tr>
        <td>Discovery Assessment int - DTT</td>
        <td>Interest charged on a Discovery Assessment for Domestic Top-Up Tax.</td>
        </tr>
        <tr>
        <td>Discovery Assmnt int-MTT(IIR)</td>
        <td>Interest charged on a Discovery Assessment for Multinational Top-Up Tax under the Income Inclusion Rule.</td>
        </tr>
        <tr>
        <td>Discovery Assmnt int-MTT(UTPR)</td>
        <td>Interest charged on a Discovery Assessment for Multinational Top-Up Tax under the Undertaxed Profits Rule.</td>
        </tr>
        <tr>
        <td>Overpaid claim assmnt - DTT</td>
        <td>Assessment raised by HMRC where a claim for overpaid Domestic Top-Up Tax is found to be incorrect.</td>
        </tr>
        <tr>
        <td>O/paid claim assmnt-MTT (IIR)</td>
        <td>Assessment raised by HMRC where a claim for overpaid Multinational Top-Up Tax under the Income Inclusion Rule is found to be incorrect.</td>
        </tr>
        <tr>
        <td>O/paid claim assmnt-MTT (UTPR)</td>
        <td>Assessment raised by HMRC where a claim for overpaid Multinational Top-Up Tax under the Undertaxed Profits Rule is found to be incorrect.</td>
        </tr>
        <tr>
        <td>O/paid claim assmnt int - DTT</td>
        <td>Interest charged on an Overpaid Claim Assessment for Domestic Top-Up Tax.</td>
        </tr>
        <tr>
        <td>O/p claim assmnt int-MTT(IIR)</td>
        <td>Interest charged on an Overpaid Claim Assessment for Multinational Top-Up Tax under the Income Inclusion Rule.</td>
        </tr>
        <tr>
        <td>O/p claim assmnt int-MTT(UTPR)</td>
        <td>Interest charged on an Overpaid Claim Assessment for Multinational Top-Up Tax under the Undertaxed Profits Rule.</td>
        </tr>
        <tr>
        <td>Pillar 2 Payment on Account</td>
        <td>A payment or repayment made towards a taxpayer's Pillar 2 account. </td>
        </tr>

        </tbody>
        </table>

        ### Error Codes
        <p>This table contains a list of 422 error codes returned when a Retrieve Account Activity request is not processed successfully.</p>
        <table>
        <thead>
        <tr>
        <th>Error Message</th>
        <th>Next Steps</th>
        </tr>
        </thead>
        <tbody>
        <tr>
        <td>001 - Regime missing or invalid</td>
        <td>No data found for this Pillar 2 ID.</td>
        </tr>
        <tr>
        <td>003 - Request could not be processed</td>
        <td>The message could not be processed due to locking. Please check if there is currently an open enquiry on your tax account.</td>
        </tr>
        <tr>
        <td>014 - No data found</td>
        <td>No data found for this Pillar 2 ID.</td>
        </tr>
        </tbody>
        </table>
      security:
      - User-Restricted:
        - read:pillar2
components:
  schemas:
    uk.gov.hmrc.pillar2submissionapi.models.uktrsubmissions.LiableEntity:
      properties:
        ukChargeableEntityName:
          type: string
          minLength: 1
          maxLength: 160
        idType:
          type: string
          minLength: 1
          maxLength: 4
        idValue:
          type: string
          minLength: 1
          maxLength: 15
        amountOwedDTT:
          type: number
          format: double
          minimum: 0
          maximum: 9.99999999999999E12
          multipleOf: 0.01
          description: In pound sterling
        amountOwedIIR:
          type: number
          format: double
          minimum: 0
          maximum: 9.99999999999999E12
          multipleOf: 0.01
          description: In pound sterling
        amountOwedUTPR:
          type: number
          format: double
          minimum: 0
          maximum: 9.99999999999999E12
          multipleOf: 0.01
          description: In pound sterling
      required:
      - ukChargeableEntityName
      - idType
      - idValue
      - amountOwedDTT
      - amountOwedIIR
      - amountOwedUTPR
    uk.gov.hmrc.pillar2submissionapi.models.accountactivity.AccountActivityClearance:
      properties:
        transactionDesc:
          type: string
          description: Description of the child transaction that took place.
        chargeRefNo:
          type: string
          nullable: true
          description: Reference for the child transaction's relevant charge kind.
        dueDate:
          nullable: true
          type: string
          format: date
          description: Date the child transaction must be settled by.
        amount:
          type: number
          format: double
          description: Portion of the child transaction which is allocated against the parent.
          minimum: -9.999999999999E10
          maximum: 9.999999999999E10
          multipleOf: 0.01
        clearingDate:
          type: string
          format: date
          description: Date the child transaction cleared against the parent.
        clearingReason:
          type: string
          nullable: true
          description: Reason the child transaction cleared against the parent.
      required:
      - transactionDesc
      - amount
      - clearingDate
      description: Information on how another transaction is allocated against the parent transaction.
    uk.gov.hmrc.pillar2submissionapi.models.accountactivity.AccountActivityTransaction:
      properties:
        transactionType:
          type: string
          description: The form of transaction that took place. Examples include 'Credit' 'Debit' and 'Payment'.
        transactionDesc:
          type: string
          description: Description of a transaction that took place.
        startDate:
          nullable: true
          type: string
          format: date
          description: Start date of the relevant accounting period.
        endDate:
          nullable: true
          type: string
          format: date
          description: End date of the relevant accounting period.
        accruedInterest:
          type: number
          format: double
          nullable: true
          description: "The total amount of interest based on a late payment (as of the date stated within the json payload) of a given transaction description. The interest amount is calculated from the day after the due date, up until the date of payment or when the interest is cleared."
          minimum: 0
          maximum: 9.999999999999E10
          multipleOf: 0.01
        chargeRefNo:
          type: string
          nullable: true
          description: Reference for the relevant charge kind.
        transactionDate:
          type: string
          format: date
          description: Date of the transaction.
        dueDate:
          nullable: true
          type: string
          format: date
          description: Date the transaction must be settled by.
        originalAmount:
          type: number
          format: double
          description: "The original monetary value of the transaction, in GBP."
          minimum: -9.999999999999E10
          maximum: 9.999999999999E10
          multipleOf: 0.01
        outstandingAmount:
          type: number
          format: double
          nullable: true
          description: "The unresolved monetary value of the transaction, in GBP."
          minimum: -9.999999999999E10
          maximum: 9.999999999999E10
          multipleOf: 0.01
        clearedAmount:
          type: number
          format: double
          nullable: true
          description: "The resolved monetary value of the transaction, in GBP."
          minimum: -9.9999999999E8
          maximum: 9.9999999999E8
          multipleOf: 0.01
        standOverAmount:
          type: number
          format: double
          nullable: true
          description: An amount of tax that is not required to be paid while an appeal is active. The stoodover amount is excluded from the outstanding balance and is held separately from the amount currently due.
          minimum: -9.9999999999E8
          maximum: 9.9999999999E8
          multipleOf: 0.01
        appealFlag:
          type: boolean
          nullable: true
          description: Indicates that the transaction is currently under appeal when present and true. A request to review a charge on a transaction. Appeals can be submitted for eligible transactions but do not apply to determinations or late payment interest charges.
        clearingDetails:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/uk.gov.hmrc.pillar2submissionapi.models.accountactivity.AccountActivityClearance"
          description: Information on how other transactions are allocated against this one.
      required:
      - transactionType
      - transactionDesc
      - transactionDate
      - originalAmount
      description: Represents a record of a change to a Pillar ID's circumstances.
    uk.gov.hmrc.pillar2submissionapi.models.accountactivity.AccountActivitySuccessResponse:
      properties:
        processingDate:
          type: string
          format: date-time
          description: The date and time that an event took place.
        transactionDetails:
          type: array
          items:
            $ref: "#/components/schemas/uk.gov.hmrc.pillar2submissionapi.models.accountactivity.AccountActivityTransaction"
          description: Records of a change to a Pillar ID's circumstances from the chosen time period.
      required:
      - processingDate
      - transactionDetails
    uk.gov.hmrc.pillar2submissionapi.models.overseasreturnnotification.ORNRetrieveSuccessResponse:
      properties:
        processingDate:
          type: string
          description: The date and time that an event took place.
        accountingPeriodFrom:
          type: string
          description: The calendar date upon which a business' accounting period begins.
        accountingPeriodTo:
          type: string
          description: The calendar date upon which a business' accounting period ends.
        filedDateGIR:
          type: string
          description: The date upon which the GloBE Information Return (GIR) was filed or submitted.
        countryGIR:
          type: string
          description: The country in which the GloBE Information Return (GIR) was submitted.
        reportingEntityName:
          type: string
          description: The name of the company that submitted the Overseas Return Notification (ORN).
        TIN:
          type: string
          description: The Tax Identification Number of the entity submitting the GloBE Information Return (GIR).
        issuingCountryTIN:
          type: string
          description: The country in which the Tax Identification Number was issued.
      required:
      - processingDate
      - accountingPeriodFrom
      - accountingPeriodTo
      - filedDateGIR
      - countryGIR
      - reportingEntityName
      - TIN
      - issuingCountryTIN
    uk.gov.hmrc.pillar2submissionapi.models.overseasreturnnotification.ORNSuccessResponse:
      properties:
        processingDate:
          type: string
          description: The date and time that an event took place.
        formBundleNumber:
          type: string
          description: "A unique identifier for the request, to be noted and retained in case amendments need to be filed against the return."
      required:
      - processingDate
      - formBundleNumber
    uk.gov.hmrc.pillar2submissionapi.models.overseasreturnnotification.ORNSubmission:
      properties:
        accountingPeriodFrom:
          type: string
          format: date
          description: The calendar date upon which a business' accounting period begins.
        accountingPeriodTo:
          type: string
          format: date
          description: The calendar date upon which a business' accounting period ends.
        filedDateGIR:
          type: string
          format: date
          description: The date upon which the GloBE Information Return (GIR) was filed or submitted.
        countryGIR:
          type: string
          minLength: 1
          maxLength: 2
          description: The country in which the GloBE Information Return (GIR) was submitted.
        reportingEntityName:
          type: string
          minLength: 1
          maxLength: 200
          description: The name of the company that submitted the GloBE Information Return (GIR).
        TIN:
          type: string
          minLength: 1
          maxLength: 200
          description: The Tax Identification Number of the entity submitting the Overseas Return Notification.
        issuingCountryTIN:
          type: string
          minLength: 1
          maxLength: 2
          description: The country in which the Tax Identification Number was issued.
      required:
      - accountingPeriodFrom
      - accountingPeriodTo
      - filedDateGIR
      - countryGIR
      - reportingEntityName
      - TIN
      - issuingCountryTIN
    uk.gov.hmrc.pillar2submissionapi.models.belowthresholdnotification.SubmitBTNSuccessResponse:
      properties:
        processingDate:
          type: string
      required:
      - processingDate
